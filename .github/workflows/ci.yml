name: ci

on:
  push:
    branches:
      - main
      - master
      - "release/**"
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      SKIP_SYSTEM_SETTINGS_DB_DURING_BUILD: "true"
      PREFLIGHT_SKIP_DB_CONNECTIVITY: "true"
      AUTH_SESSION_SECRET: "ci-build-secret"
      AUTH_APP_BASE_URL: "http://127.0.0.1:3000"
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/ats"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Lint
        run: npm run ci:lint

      - name: Preflight checks
        run: npm run ci:preflight

      - name: Build
        run: npm run ci:build

  unit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

  api-smoke:
    runs-on: ubuntu-latest
    needs: build
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: ats
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=20
    env:
      NODE_ENV: production
      DATABASE_URL: "mysql://root:root@127.0.0.1:3306/ats"
      AUTH_SESSION_SECRET: "ci-smoke-secret"
      AUTH_APP_BASE_URL: "http://127.0.0.1:3000"
      AUTH_DEFAULT_PASSWORD: "Welcome123!"
      EMAIL_TEST_MODE: "true"
      EMAIL_TEST_RECIPIENT: "ci@example.local"
      SKIP_SYSTEM_SETTINGS_DB_DURING_BUILD: "false"
      PREFLIGHT_DB_RETRIES: "20"
      PREFLIGHT_DB_RETRY_DELAY_MS: "3000"
      BASE_URL: "http://127.0.0.1:3000"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Preflight checks
        run: npm run ci:preflight

      - name: Apply migrations (retry)
        run: |
          for i in {1..20}; do
            npx prisma migrate deploy && break
            echo "Waiting for MySQL..."
            sleep 3
            if [ "$i" -eq 20 ]; then
              echo "Prisma migration deploy failed after retries."
              exit 1
            fi
          done

      - name: Build app
        run: npm run ci:build

      - name: Start app
        run: |
          npm run start > /tmp/ats-start.log 2>&1 &
          echo $! > /tmp/ats.pid

      - name: Wait for health endpoint
        run: |
          for i in {1..40}; do
            if curl -fsS http://127.0.0.1:3000/api/health >/dev/null 2>&1; then
              exit 0
            fi
            sleep 2
          done
          echo "Health endpoint did not become ready."
          cat /tmp/ats-start.log || true
          exit 1

      - name: Run permissions smoke checks
        run: npm run ci:smoke

      - name: Run career site smoke checks
        run: npm run ci:smoke:careers

      - name: Print app logs on failure
        if: failure()
        run: |
          echo "=== App server logs ==="
          cat /tmp/ats-start.log || true
          echo "=== End of app server logs ==="

      - name: Stop app
        if: always()
        run: |
          if [ -f /tmp/ats.pid ]; then
            kill "$(cat /tmp/ats.pid)" || true
          fi
